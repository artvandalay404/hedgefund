# Update `app` after running: fly launch --name hedgefund-<your-suffix>
app = "hedgefund"
primary_region = "iad"

[build]

[env]
  TZ = "America/New_York"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
